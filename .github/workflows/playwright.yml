# ─────────────────────────────────────────────────────────────────────────────
# playwright.yml
# Pipeline CI/CD para el framework Playwright + TypeScript sobre SauceDemo.
#
# Disparadores:
#   - push a main         → corre la suite completa y despliega el reporte
#   - pull_request a main → valida los cambios antes del merge
#
# Jobs:
#   test   → instala, corre los tests, sube artefactos
#   deploy → publica el reporte HTML en GitHub Pages (solo en push a main)
# ─────────────────────────────────────────────────────────────────────────────

name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents:      read
  pages:         write
  id-token:      write

jobs:
  # ─── Job 1: Ejecutar la suite de tests ────────────────────────────────────
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 20 con caché de npm para instalaciones más rápidas
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Instalar dependencias del proyecto
      - name: Instalar dependencias
        run: npm install

      # 4. Descargar los binarios de los navegadores de Playwright
      #    --with-deps instala también las dependencias del sistema (librerías del SO)
      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps

      # 5. Crear el archivo .env con las variables de entorno necesarias
      #    En un proyecto real estas irían en GitHub Secrets:
      #    BASE_URL: ${{ secrets.BASE_URL }}
      - name: Crear archivo .env
        run: |
          cat <<EOF > .env
          BASE_URL=https://www.saucedemo.com
          STANDARD_USER=standard_user
          LOCKED_USER=locked_out_user
          PASSWORD=secret_sauce
          EOF

      # 6. Ejecutar la suite completa de tests
      - name: Correr tests de Playwright
        run: npm test

      # 7. Subir los artefactos (reporte HTML + resultados JSON + screenshots/videos)
      #    Se ejecuta SIEMPRE, incluso si los tests fallan (if: always())
      #    Retención de 30 días para revisión post-ejecución
      - name: Subir artefactos de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      # 8. Preparar el reporte HTML para publicación en GitHub Pages
      #    Solo se ejecuta en push a main (no en PRs)
      - name: Configurar GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Subir reporte como artefacto de Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica solo el reporte HTML interactivo de Playwright
          path: playwright-report/

  # ─── Job 2: Desplegar el reporte en GitHub Pages ──────────────────────────
  # Se ejecuta solo después de que el job 'test' termine (exitoso o no)
  # y únicamente en push a main.
  deploy:
    name: Deploy Report to GitHub Pages
    needs: test
    runs-on: ubuntu-latest

    # Solo desplegamos en push directo a main, no en pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
